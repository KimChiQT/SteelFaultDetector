services:
  - type: web
    name: detectsteel-backend
    env: python
    rootDir: .
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /history
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
